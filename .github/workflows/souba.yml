name: 毎朝相場通知

on:
  schedule:
    - cron: '0 21 * * 0-5'  # 日本時間 毎朝7時（UTC 23時、月〜土）
  workflow_dispatch:          # 手動実行も可能

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Warning対策: v3 → v4 に更新
      - uses: actions/checkout@v4

      - name: Python セットアップ
        # Warning対策: v4 → v5 に更新
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリインストール
        # エラー対策: 行の最後に pandas-ta を追加
        run: pip install yfinance pandas requests beautifulsoup4 pytz gspread google-auth pandas-ta

      - name: 相場通知実行
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEND_TO:        ${{ secrets.SEND_TO }}
          SHEET_ID:       ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:   ${{ secrets.GOOGLE_CREDS }}
        run: python souba.py
