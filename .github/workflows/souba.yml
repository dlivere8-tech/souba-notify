name: 毎朝相場通知

on:
  workflow_dispatch:  # ローカルPCのバッチファイルで実行するため自動スケジュールは無効化

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # docs/data/ のコミット・プッシュに必要
    steps:
      # Warning対策: v3 → v4 に更新
      - uses: actions/checkout@v4

      - name: Python セットアップ
        # Warning対策: v4 → v5 に更新
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリインストール
        # エラー対策: 行の最後に pandas-ta を追加
        run: pip install yfinance pandas requests beautifulsoup4 pytz gspread google-auth pandas-ta

      - name: 相場通知実行
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEND_TO:        ${{ secrets.SEND_TO }}
          SHEET_ID:       ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:   ${{ secrets.GOOGLE_CREDS }}
        run: python souba.py

      - name: JSONデータをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "data: results $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
