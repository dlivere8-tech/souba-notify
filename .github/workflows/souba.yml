name: 毎朝相場通知

on:
  schedule:
    - cron: '0 22 * * 0-4'  # 日本時間 毎朝8時（UTC 23時、月〜金）
  workflow_dispatch:          # 手動実行も可能

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install yfinance pandas requests beautifulsoup4 pytz gspread google-auth

      - name: 相場通知実行
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEND_TO:        ${{ secrets.SEND_TO }}
          SHEET_ID:       ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:   ${{ secrets.GOOGLE_CREDS }}
        run: python souba.py
