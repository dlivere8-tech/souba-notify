<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>株式ウォッチリスト</title>
  <style>
    :root {
      --bg: #111; --surface: #1c1c1e; --surface2: #2c2c2e;
      --accent: #0a84ff; --green: #30d158; --red: #ff453a; --yellow: #ffd60a;
      --text: #f2f2f7; --muted: #8e8e93; --border: #38383a; --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg); color: var(--text);
      padding: 12px; max-width: 600px; margin: 0 auto;
    }

    /* ── Header ── */
    .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .app-title { font-size: 18px; font-weight: 700; }
    .app-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      border: none; border-radius: 8px; padding: 10px 16px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: opacity .15s;
    }
    .btn:active { opacity: .7; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 7px 12px; font-size: 13px; border-radius: 7px; }
    .btn-danger { background: rgba(255,69,58,.15); color: var(--red); border: 1px solid rgba(255,69,58,.3); }

    /* ── Editor Panel ── */
    .editor-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px; margin-bottom: 12px;
    }
    .editor-row { display: flex; gap: 6px; align-items: center; }
    .slot-select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 10px 8px;
      font-size: 14px; -webkit-appearance: none; appearance: none;
      flex-shrink: 0; width: 72px; text-align: center; cursor: pointer;
    }
    .slot-select:focus { outline: none; border-color: var(--accent); }
    .search-wrap { flex: 1; position: relative; }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 10px 12px;
      font-size: 16px; -webkit-appearance: none;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; z-index: 100; max-height: 240px; overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .search-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid var(--border);
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:active { background: var(--surface2); }
    .search-item-name { font-size: 13px; font-weight: 500; }
    .search-item-code { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; margin-left: 8px; }

    /* ── Cards ── */
    .cards-container { display: flex; flex-direction: column; gap: 10px; }
    .stock-card {
      background: var(--surface); border-radius: var(--r);
      padding: 14px; border: 1px solid var(--border);
    }
    .stock-card.err { border-color: var(--red); }
    .card-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .stock-code { font-size: 11px; color: var(--muted); }
    .stock-name { font-size: 16px; font-weight: 600; line-height: 1.2; margin-top: 2px; }
    .price-block { text-align: right; }
    .price-val { font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .price-chg { font-size: 13px; font-weight: 600; margin-top: 1px; }
    .pos { color: var(--green); } .neg { color: var(--red); }

    .scores-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .score-box { background: var(--surface2); border-radius: 10px; padding: 10px 12px; }
    .score-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .score-main { display: flex; align-items: baseline; gap: 6px; }
    .score-num { font-size: 26px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .score-num.high { color: var(--green); }
    .score-num.mid  { color: var(--yellow); }
    .score-num.low  { color: var(--red); }
    .score-dir { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .dir-buy  { background: rgba(48,209,88,.15); color: var(--green); }
    .dir-sell { background: rgba(255,69,58,.15); color: var(--red); }
    .score-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
    .score-note { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.3; }
    .score-excluded { font-size: 10px; color: var(--red); margin-top: 4px; }

    .sl-tp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .sl-box { background: rgba(255,69,58,.07); border: 1px solid rgba(255,69,58,.25); border-radius: 8px; padding: 7px 10px; }
    .tp-box { background: rgba(48,209,88,.07); border: 1px solid rgba(48,209,88,.25); border-radius: 8px; padding: 7px 10px; }
    .sl-label { font-size: 10px; color: var(--red); text-transform: uppercase; letter-spacing: .04em; }
    .tp-label { font-size: 10px; color: var(--green); text-transform: uppercase; letter-spacing: .04em; }
    .sl-val { font-size: 14px; font-weight: 600; color: var(--red); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .tp-val { font-size: 14px; font-weight: 600; color: var(--green); margin-top: 2px; font-variant-numeric: tabular-nums; }

    .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .metric { background: var(--surface2); border-radius: 8px; padding: 7px 10px; }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .metric-val { font-size: 14px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .trend-up { color: var(--green); } .trend-down { color: var(--red); }

    .card-ftr { display: flex; justify-content: flex-end; padding-top: 4px; border-top: 1px solid var(--border); margin-top: 2px; }
    .err-msg { font-size: 13px; color: var(--red); margin: 4px 0 8px; }
    .empty-card { background: var(--surface); border-radius: var(--r); border: 1px dashed var(--border); padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.7; padding: 0 4px; }

    @media (prefers-color-scheme: light) {
      :root { --bg: #f2f2f7; --surface: #fff; --surface2: #f2f2f7; --text: #1c1c1e; --muted: #8e8e93; --border: #c6c6c8; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="app-title">株式ウォッチリスト</div>
    <div class="app-sub" id="lastUpdated">未更新</div>
  </div>

</div>

<!-- Slot editor -->
<div class="editor-panel">

      <div id="searchDropdown" class="search-dropdown" style="display:none"></div>
    </div>
    <button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveSlot()">保存</button>
    <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteSlot()">削除</button>
  </div>
</div>

<div class="cards-container" id="cardsContainer"></div>

</div>

// Technical Indicators
// ─────────────────────────────────────────────
function calcRSI(closes, period = 14) {
  const n = closes.length;
  if (n < period + 2) return 50;
  let ag = 0, al = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) ag += d; else al -= d;
  }
  ag /= period; al /= period;
  for (let i = period + 1; i < n; i++) {
    const d = closes[i] - closes[i - 1];
    ag = (ag * (period - 1) + Math.max(d, 0)) / period;
    al = (al * (period - 1) + Math.max(-d, 0)) / period;
  }
  if (al === 0) return 100;
  return 100 - 100 / (1 + ag / al);
}

function smaLast(arr, period) {
  if (arr.length < period) return null;
  return arr.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function calcATR(highs, lows, closes, period = 14) {
  const n = highs.length;
  if (n < period + 1) return 0;
  const trs = [];
  for (let i = 1; i < n; i++) {
    trs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1])));
  }
  let atr = trs.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < trs.length; i++) atr = (atr * (period - 1) + trs[i]) / period;
  return atr;
}

function calcBBPctB(closes, period = 20, nStd = 2) {
  if (closes.length < period) return null;
  const sl = closes.slice(-period);
  const mean = sl.reduce((a, b) => a + b, 0) / period;
  const std = Math.sqrt(sl.reduce((a, b) => a + (b - mean) ** 2, 0) / period);
  if (std === 0) return null;
  return (closes[closes.length - 1] - (mean - nStd * std)) / (2 * nStd * std);
}

function calcEMA(arr, period) {
  if (arr.length < period) return [];
  const k = 2 / (period + 1);
  let ema = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
  const out = [ema];
  for (let i = period; i < arr.length; i++) { ema = arr[i] * k + ema * (1 - k); out.push(ema); }
  return out;
}

function calcMACDLines(closes) {
  const n = closes.length;
  if (n < 34) return { macd: [], signal: [] };
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const macdFull = ema26.map((v, i) => ema12[i + 14] - v);
  if (macdFull.length < 9) return { macd: macdFull, signal: [] };
  const sigFull = calcEMA(macdFull, 9);
  return { macd: macdFull.slice(8), signal: sigFull };
}

function macdCrossScore(macd, signal, dir) {
  const n = Math.min(macd.length, signal.length);
  if (n < 4) return 0;
  for (let i = n - 3; i < n; i++) {
    const prev = macd[i-1] - signal[i-1], curr = macd[i] - signal[i];
    if (dir === '買い' && prev < 0 && curr >= 0) return 10;
    if (dir === '売り' && prev > 0 && curr <= 0) return 10;
  }
  return 0;
}

function calcHVN(dates, closes, volumes, curr, bins = 20) {
  const n = closes.length;
  if (n < bins) return { sup: null, res: null };
  const cutoff = dates[n-1] - 30 * 86400000;
  const minP = Math.min(...closes), maxP = Math.max(...closes);
  if (maxP === minP) return { sup: null, res: null };
  const binSz = (maxP - minP) / bins;
  const bVols = new Float64Array(bins);
  for (let i = 0; i < n; i++) {
    const w = dates[i] >= cutoff ? 2 : 1;
    bVols[Math.min(Math.floor((closes[i] - minP) / binSz), bins - 1)] += volumes[i] * w;
  }
  const top5 = Array.from(bVols).map((v, i) => ({ v, c: minP + (i + 0.5) * binSz }))
    .sort((a, b) => b.v - a.v).slice(0, 5).map(x => x.c).sort((a, b) => a - b);
  return {
    sup: Math.max(...top5.filter(p => p < curr), -Infinity),
    res: Math.min(...top5.filter(p => p > curr), Infinity)
  };
}

// ─────────────────────────────────────────────
// Scoring (NEW weights: T20絶対・RSI35・%B20・RR15・MACD10)
// ─────────────────────────────────────────────
function rsiScore(rsi) {
  if (rsi >= 40 && rsi <= 60) return { buy: 35, sell: 35 };
  if (rsi >= 30 && rsi <  40) return { buy: 28, sell: 14 };
  if (rsi >  60 && rsi <= 70) return { buy: 14, sell: 28 };
  if (rsi < 30)               return { buy: 35, sell:  0 };
  return { buy: 0, sell: 35 };  // rsi > 70
}

function rankScore(values, higherIsBetter, maxPts) {
  const n = values.length;
  if (n <= 1) return new Array(n).fill(maxPts);
  const sorted = values.map((v, i) => ({ v, i })).sort((a, b) => a.v - b.v);
  const ranks = new Array(n);
  let i = 0;
  while (i < n) {
    let j = i;
    while (j < n && sorted[j].v === sorted[i].v) j++;
    const avg = (i + 1 + j) / 2;
    for (let k = i; k < j; k++) ranks[sorted[k].i] = avg;
    i = j;
  }
  return ranks.map(r => higherIsBetter ? (r-1)/(n-1)*maxPts : (n-r)/(n-1)*maxPts);
}

function computeRaw(code, name, dates, highs, lows, closes, volumes) {
  const n = closes.length;
  if (n < 20) return null;
  const curr = closes[n-1], prev = closes[n-2];
  const changePct = prev ? (curr - prev) / prev * 100 : 0;
  const rsi = calcRSI(closes);
  const ma25 = smaLast(closes, 25), ma75 = smaLast(closes, 75);
  const maDiv = (ma25 && ma75 && ma75 !== 0) ? (ma25 - ma75) / ma75 * 100 : 0;
  const trend = maDiv > 0 ? '上昇' : '下降';
  const atr = calcATR(highs, lows, closes);
  const rH = highs.slice(-20), rL = lows.slice(-20), rC = closes.slice(-20), rV = volumes.slice(-20);
  const atrPct = curr > 0 ? atr / curr * 100 : 0;
  const avgRange = rC.reduce((s, c, i) => s + (rH[i] - rL[i]) / c * 100, 0) / 20;
  const volMean = rV.reduce((a, b) => a + b, 0) / 20;
  const volStd = Math.sqrt(rV.reduce((a, b) => a + (b - volMean) ** 2, 0) / 20);
  const tradeVal = volMean * curr / 1e8;
  const priceS = (curr >= 500 && curr <= 15000) ? 1.0 : 0.3;
  const daytradeScore = round1(
    Math.min(atrPct / 5 * 30, 30) + Math.min(avgRange / 5 * 25, 25) +
    Math.min(tradeVal / 500 * 25, 25) + Math.max(10 - (volStd/(volMean+1e-10)) * 5, 0) +
    priceS * 10
  );
  const dtDir = changePct >= 0 ? '買い' : '売り';
  const hvn = calcHVN(dates, closes, volumes, curr);
  const supBuy = isFinite(hvn.sup) && hvn.sup !== -Infinity ? hvn.sup : null;
  const resBuy = isFinite(hvn.res) && hvn.res !== Infinity  ? hvn.res : null;
  let rrBuy = 0, rrSell = 0;
  if (supBuy !== null && resBuy !== null && curr !== supBuy && curr !== resBuy) {
    rrBuy  = Math.abs(resBuy - curr) / Math.abs(curr - supBuy);
    rrSell = Math.abs(curr - supBuy) / Math.abs(resBuy - curr);
  }
  const pctB = calcBBPctB(closes);
  const rsiSc = rsiScore(rsi);
  return {
    code, name, curr, changePct, rsi, trend, maDiv, atr,
    dtDir, dtSup: dtDir === '買い' ? curr - atr : curr + atr,
    dtRes: dtDir === '買い' ? curr + 2*atr : curr - 2*atr,
    daytradeScore, rrBuyRaw: rrBuy, rrSellRaw: rrSell,
    buyRsiScore: rsiSc.buy, sellRsiScore: rsiSc.sell,
    supBuy, resBuy, pctB,
    _closes: closes, _highs: highs, _lows: lows, _volumes: volumes, _dates: dates
  };
}

function computeSwingScores(raws) {
  // ルール2: 前日比±3%超の銘柄をスイング選出から除外
  const eligible = raws.filter(r => Math.abs(r.changePct) <= 3.0);
  const excluded  = raws.filter(r => Math.abs(r.changePct) >  3.0);

  for (const r of excluded) {
    r.swingDir = r.changePct >= 0 ? '買い' : '売り';
    r.swingScoreBase = 0;
    r.swingSup = r.supBuy; r.swingRes = r.resBuy;
    r.swingExcluded = true;
  }

  const n = eligible.length;
  if (n === 0) return;

  function rrScoreAbs(rr) {
    if (!rr || rr <= 0) return 0;
    if (rr >= 3.0) return 15;
    if (rr >= 2.0) return 12;
    if (rr >= 1.5) return 9;
    if (rr >= 1.0) return 6;
    return 3;
  }

  for (let i = 0; i < n; i++) {
    const r = eligible[i];
    const buyTrendSc  = r.maDiv > 0 ? 20 : 0;
    const sellTrendSc = r.maDiv > 0 ?  0 : 20;
    const pctB = r.pctB;
    const buyBB  = pctB !== null ? Math.max(0, round1((1 - pctB) * 20)) : 0;
    const sellBB = pctB !== null ? Math.max(0, round1(pctB * 20))        : 0;
    const buyTmp  = buyTrendSc  + r.buyRsiScore  + rrScoreAbs(r.rrBuyRaw)  + buyBB;
    const sellTmp = sellTrendSc + r.sellRsiScore + rrScoreAbs(r.rrSellRaw) + sellBB;
    const tentDir = buyTmp >= sellTmp ? '買い' : '売り';
    const { macd, signal } = calcMACDLines(r._closes);
    const macdPts = macdCrossScore(macd, signal, tentDir);
    const buyScore  = buyTmp  + (tentDir === '買い' ? macdPts : 0);
    const sellScore = sellTmp + (tentDir === '売り' ? macdPts : 0);
    if (buyScore >= sellScore) {
      r.swingDir = '買い'; r.swingScoreBase = round1(buyScore);
      r.swingSup = r.supBuy; r.swingRes = r.resBuy;
    } else {
      r.swingDir = '売り'; r.swingScoreBase = round1(sellScore);
      r.swingSup = r.resBuy; r.swingRes = r.supBuy;
    }
    r.swingExcluded = false;
  }
}

function getFinalSwingScore(raw, shinyo) {
  let s = raw.swingScoreBase ?? 0;
  if (shinyo != null) {
    if (raw.swingDir === '買い' && shinyo >= 5.0) s -= 10;
    if (raw.swingDir === '売り' && shinyo <= 0.5) s -= 10;
  }
  return round1(s);
}

// AbortSignal.timeout polyfill (not available in Safari < 16)
function _timeoutSignal(ms) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return ctrl.signal;
}

// Wrap allorigins.win/get response into a Response-like object
async function _wrapGetResponse(res) {
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const wrapped = await res.json();
  const body = wrapped.contents;
  if (!body) throw new Error('空レスポンス');
  return {
    ok: true,
    text: () => Promise.resolve(body),
    json: () => Promise.resolve(JSON.parse(body)),
  };
}

// Race 3 proxies: corsproxy.io, allorigins/raw, allorigins/get (delayed).
// Returns the first successful Response-like object.
async function proxyFetch(targetUrl, timeoutMs = 22000) {
  const enc = encodeURIComponent(targetUrl);

  const attempt = (url, transform, delayMs = 0) =>
    new Promise((resolve, reject) => {
      setTimeout(async () => {
        try {
          const res = await fetch(url, { signal: _timeoutSignal(timeoutMs - delayMs) });
          resolve(await (transform ? transform(res) : (res.ok ? res : Promise.reject(new Error(res.status)))));
        } catch (e) { reject(e); }
      }, delayMs);
    });

  return Promise.any([
    attempt('https://corsproxy.io/?url=' + enc,                        null,            0),
    attempt('https://api.allorigins.win/raw?url=' + enc,               null,            800),
    attempt('https://api.allorigins.win/get?url=' + enc, _wrapGetResponse, 2500),
  ]).catch(() => { throw new Error('データ取得失敗（プロキシ全滅）'); });
}

async function _fetchYFChartOnce(code) {
  const yfUrl = `${YF_CHART_BASE}${code}.T?interval=1d&range=6mo`;
  const res   = await proxyFetch(yfUrl, 22000);
  const json  = await res.json();
  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('データなし');
  const meta = result.meta;
  const name = meta.shortName || meta.longName || code;
  const ts = result.timestamp, q = result.indicators.quote[0];
  const dates = [], highs = [], lows = [], closes = [], volumes = [];
  for (let i = 0; i < ts.length; i++) {
    if (q.close[i] != null && q.high[i] != null && q.low[i] != null && q.volume[i] != null) {
      dates.push(ts[i] * 1000); highs.push(q.high[i]); lows.push(q.low[i]);
      closes.push(q.close[i]); volumes.push(q.volume[i]);
    }
  }
  if (closes.length < 20) throw new Error('データ不足');
  return { name, dates, highs, lows, closes, volumes };
}

async function fetchYFChart(code) {
  try {
    return await _fetchYFChartOnce(code);
  } catch (e) {
    // 1回自動リトライ（1.5秒後）
    await new Promise(r => setTimeout(r, 1500));
    return await _fetchYFChartOnce(code);
  }
}

async function fetchShinyoBairitu(code) {
  try {
    const url = `https://kabutan.jp/stock/finance?code=${code}`;
    const res = await proxyFetch(url, 18000);
    const html = await res.text();
    const idx = html.indexOf('\u4fe1\u7528\u500d\u7387'); // 信用倍率
    if (idx < 0) return null;
    const section = html.slice(idx, idx + 1200);
    const tbl = section.slice(0, Math.max(section.indexOf('</table>'), section.length));
    const matches = [...tbl.matchAll(/<td>([\d.]+)<span[^>]*>\u500d<\/span>/g)];
    if (!matches.length) return null;
    return parseFloat(matches[matches.length - 1][1]);
  } catch {
    return null;
  }
}

// Concurrency limiter: run tasks with at most `limit` in parallel
async function _runConcurrent(tasks, limit) {
  const results = new Array(tasks.length);
  const queue = tasks.map((fn, i) => ({ fn, i }));
  async function worker() {
    while (queue.length) {
      const { fn, i } = queue.shift();
      results[i] = await fn();
    }
  }
  await Promise.all(Array.from({ length: Math.min(limit, tasks.length) }, worker));
  return results;
}

async function updateAll() {
  if (isUpdating) return;
  isUpdating = true;
  const btn = document.getElementById('updateAllBtn');
  btn.disabled = true;

  const active = tickers.filter(t => t.trim() !== '');
  // Show loading state
  for (const code of active) {
    stockResults[code] = { raw: null, shinyo: null, shinyoLoading: false, error: null, loading: true };
  }
  renderCards();

  let done = 0;
  const allResults = [];

  // Fetch OHLCV — max 3 concurrent, render each card as it finishes
  const tasks = active.map(code => async () => {
    let result;
    try {
      const data = await fetchYFChart(code);
      const raw  = computeRaw(code, data.name, data.dates, data.highs, data.lows, data.closes, data.volumes);
      if (!raw) throw new Error('計算エラー');
      result = { code, raw, error: null };
    } catch (e) {
      result = { code, raw: null, error: e.message };
    }
    allResults.push(result);
    stockResults[code] = { raw: result.raw, shinyo: null, shinyoLoading: false, error: result.error, loading: false };
    renderCardFor(code);
    done++;
    btn.textContent = `更新中 ${done}/${active.length}`;
    return result;
  });

  await _runConcurrent(tasks, 3);

  // Compute swing scores once all are in
  const goodRaws = allResults.filter(r => r.raw).map(r => r.raw);
  computeSwingScores(goodRaws);
  renderCards();
  updateLastUpdated();
  btn.disabled = false; btn.textContent = '↻ 全更新';
  isUpdating = false;

  // Fetch credit ratios sequentially (1 at a time to avoid hammering kabutan)
  for (const { code, raw } of allResults) {
    if (!raw) continue;
    stockResults[code].shinyoLoading = true;
    renderCardFor(code);
    fetchShinyoBairitu(code).then(ratio => {
      if (!stockResults[code]) return;
      stockResults[code].shinyo = ratio;
      stockResults[code].shinyoLoading = false;
      renderCardFor(code);
    }).catch(() => {
      if (!stockResults[code]) return;
      stockResults[code].shinyoLoading = false;
      renderCardFor(code);
    });
    // Small gap between credit ratio requests
    await new Promise(r => setTimeout(r, 300));
  }
}

async function updateSingle(code) {
  stockResults[code] = { raw: null, shinyo: null, shinyoLoading: false, error: null, loading: true };
  renderCardFor(code);
  try {
    const data = await fetchYFChart(code);
    const raw  = computeRaw(code, data.name, data.dates, data.highs, data.lows, data.closes, data.volumes);
    if (!raw) throw new Error('計算エラー');
    stockResults[code] = { raw, shinyo: null, shinyoLoading: true, error: null, loading: false };
    const allRaws = tickers.filter(t => t.trim() !== '' && stockResults[t]?.raw).map(t => stockResults[t].raw);
    computeSwingScores(allRaws);
    renderCards();
    updateLastUpdated();
    fetchShinyoBairitu(code).then(ratio => {
      if (!stockResults[code]) return;
      stockResults[code].shinyo = ratio;
      stockResults[code].shinyoLoading = false;
      renderCardFor(code);
    }).catch(() => {
      if (!stockResults[code]) return;
      stockResults[code].shinyoLoading = false;
      renderCardFor(code);
    });
  } catch (e) {
    stockResults[code] = { raw: null, shinyo: null, shinyoLoading: false, error: e.message, loading: false };
    renderCardFor(code);
  }
}

// ─────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────
function renderCards() {
  const active = tickers.filter(t => t.trim() !== '');
  if (!active.length) {
    document.getElementById('cardsContainer').innerHTML =
      '<div class="empty-card">銘柄を設定してください</div>';
    return;
  }
  document.getElementById('cardsContainer').innerHTML = active.map(buildCard).join('');
}

function renderCardFor(code) {
  const el = document.getElementById(`card-${code}`);
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = buildCard(code);
  el.replaceWith(tmp.firstElementChild);
}

function buildCard(code) {
  const e = stockResults[code];
  if (!e || e.loading) {
    return `<div class="stock-card" id="card-${code}">
      <div class="card-hdr">
        <div><div class="stock-code">${code}</div><div class="stock-name">取得中...</div></div>
        <div class="spinner"></div>
      </div></div>`;
  }
  if (e.error) {
    return `<div class="stock-card err" id="card-${code}">
      <div class="card-hdr">
        <div><div class="stock-code">${code}</div>
          <div class="stock-name" style="color:var(--red)">取得エラー</div></div>
        <button class="btn btn-secondary btn-sm" onclick="updateSingle('${code}')">再試行</button>
      </div>
      <div class="err-msg">${e.error}</div>
    </div>`;
  }
  if (!e.raw) {
    return `<div class="stock-card" id="card-${code}">
      <div class="card-hdr">
        <div class="stock-code">${code}</div>
        <button class="btn btn-secondary btn-sm" onclick="updateSingle('${code}')">↻ 更新</button>
      </div></div>`;
  }
  const r       = e.raw;
  const shinyo  = e.shinyo;
  const swScore = getFinalSwingScore(r, shinyo);
  const dtScore = r.daytradeScore;
  const chgSign = r.changePct >= 0 ? '+' : '';
  const chgCls  = r.changePct >= 0 ? 'pos' : 'neg';
  const trCls   = r.trend === '上昇' ? 'trend-up' : 'trend-down';
  const dtDirCls = r.dtDir    === '買い' ? 'dir-buy' : 'dir-sell';
  const swDirCls = r.swingDir === '買い' ? 'dir-buy' : 'dir-sell';

  let shinyoStr;
  if (e.shinyoLoading) {
    shinyoStr = '<span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span>';
  } else {
    shinyoStr = shinyo != null ? shinyo.toFixed(2) : '-';
  }

  const swingNote = r.swingExcluded
    ? `<div class="score-excluded">⚠ 前日比±3%超・選出除外</div>`
    : '';

  return `<div class="stock-card" id="card-${code}">
    <div class="card-hdr">
      <div>
        <div class="stock-code">${code}</div>
        <div class="stock-name">${stockName(code)}</div>
      </div>
      <div class="price-block">
        <div class="price-val">¥${fmtP(r.curr)}</div>
        <div class="price-chg ${chgCls}">${chgSign}${r.changePct.toFixed(2)}%</div>
      </div>
    </div>
    <div class="scores-row">
      <div class="score-box">
        <div class="score-label">デイトレスコア</div>
        <div class="score-main">
          <span class="score-num ${sColor(dtScore)}">${dtScore}</span>
          <span class="score-dir ${dtDirCls}">${r.dtDir}</span>
        </div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${clamp(dtScore)}%;background:${sBg(dtScore)}"></div></div>
      </div>
      <div class="score-box">
        <div class="score-label">スイングスコア</div>
        <div class="score-main">
          <span class="score-num ${sColor(swScore)}">${swScore}</span>
          <span class="score-dir ${swDirCls}">${r.swingDir}</span>
        </div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${clamp(swScore)}%;background:${sBg(swScore)}"></div></div>
        ${swingNote}
      </div>
    </div>
    <div class="sl-tp-row">
      <div class="sl-box">
        <div class="sl-label">損切り（デイ・${r.dtDir}）</div>
        <div class="sl-val">¥${fmtP(r.dtSup)}</div>
      </div>
      <div class="tp-box">
        <div class="tp-label">利確（デイ・${r.dtDir}）</div>
        <div class="tp-val">¥${fmtP(r.dtRes)}</div>
      </div>
    </div>
    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">RSI(14)</div>
        <div class="metric-val">${r.rsi.toFixed(1)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">信用倍率</div>
        <div class="metric-val">${shinyoStr}</div>
      </div>
      <div class="metric">
        <div class="metric-label">トレンド</div>
        <div class="metric-val ${trCls}">${r.trend}</div>
      </div>
    </div>
    <div class="card-ftr">
      <button class="btn btn-secondary btn-sm" onclick="updateSingle('${code}')">↻ 更新</button>
    </div>
  </div>`;
}

function updateLastUpdated() {
  document.getElementById('lastUpdated').textContent =
    '最終更新: ' + new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ─────────────────────────────────────────────
// Slot Editor (dropdown + search input)
// ─────────────────────────────────────────────
function renderSlotSelect() {
  const sel = document.getElementById('slotSelect');
  sel.innerHTML = tickers.map((code, i) => {
    const label = code.trim() ? `${i+1}. ${stockName(code)}` : `${i+1}. ---`;
    return `<option value="${i}">${label}</option>`;
  }).join('');
  // Sync input to current slot
  syncInputToSlot();
}

function onSlotChange() {
  pendingCode = null;
  closeDropdown();
  syncInputToSlot();
}

function syncInputToSlot() {
  const i = getCurrentSlotIdx();
  const code = tickers[i].trim();
  const input = document.getElementById('searchInput');
  input.value = code ? `${code} ${stockName(code)}` : '';
  pendingCode = code || null;
}

function getCurrentSlotIdx() {
  return parseInt(document.getElementById('slotSelect').value, 10) || 0;
}

function _codeFromInput() {
  if (pendingCode) return pendingCode;
  // Accept bare code "7203" or "7203 トヨタ自動車" typed directly
  const val = document.getElementById('searchInput').value.trim();
  const m = val.match(/^(\d{4})(\s|$)/);
  return m ? m[1] : null;
}

function saveSlot() {
  const i = getCurrentSlotIdx();
  const code = _codeFromInput();
  if (!code) { alert('銘柄コード（4桁）を入力してください'); return; }
  const oldCode = tickers[i];
  if (oldCode === code) { closeDropdown(); return; }  // 変更なし
  tickers[i] = code;
  saveTickers();
  pendingCode = null;
  renderSlotSelect();
  closeDropdown();
  // カードを即座にロード中として追加表示してから取得開始
  stockResults[code] = { raw: null, shinyo: null, shinyoLoading: false, error: null, loading: true };
  if (oldCode && !tickers.includes(oldCode)) delete stockResults[oldCode];
  renderCards();
  updateSingle(code);
}

function deleteSlot() {
  const i = getCurrentSlotIdx();
  const code = tickers[i];
  tickers[i] = '';
  if (code) delete stockResults[code];
  saveTickers();
  renderSlotSelect();
  closeDropdown();
  renderCards();
}

function closeDropdown() {
  document.getElementById('searchDropdown').style.display = 'none';
}

// ─────────────────────────────────────────────
// Search (inline dropdown)
// ─────────────────────────────────────────────
let _searchTimer = null;

function onSearchFocus() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) showDropdown(q);
}

function onSearchInput(val) {
  clearTimeout(_searchTimer);
  pendingCode = null;
  const q = val.trim();
  if (!q) { closeDropdown(); return; }
  // Show local N225 results instantly
  showDropdown(q);
  // Debounce remote search for non-Japanese queries
  _searchTimer = setTimeout(() => doRemoteSearch(q), 600);
}

function showDropdown(q) {
  const ql = q.toLowerCase();
  const matches = N225_CODES.filter(code => {
    if (code.startsWith(q)) return true;
    const jp = (N225_JP[code] || '').toLowerCase();
    const en = (N225_NAMES[code] || '').toLowerCase();
    return jp.includes(ql) || en.includes(ql);
  }).slice(0, 12);

  const dd = document.getElementById('searchDropdown');
  let html = matches.map(code => {
    const name = N225_JP[code] || N225_NAMES[code] || code;
    return `<div class="search-item" onclick="selectItem('${code}')">
      <span class="search-item-name">${name}</span>
      <span class="search-item-code">${code}</span>
    </div>`;
  }).join('');

  // 4桁数字でN225に存在しないコードは「直接指定」として追加
  if (/^\d{4}$/.test(q) && !N225_JP[q]) {
    html = `<div class="search-item" style="border-bottom:1px solid var(--border)" onclick="selectItem('${q}')">
      <span class="search-item-name" style="color:var(--accent)">コード ${q} を直接指定（日本株全般）</span>
      <span class="search-item-code">${q}</span>
    </div>` + html;
  }

  if (!html) { dd.style.display = 'none'; return; }
  dd.innerHTML = html;
  dd.style.display = 'block';
}

async function doRemoteSearch(q) {
  try {
    const apiUrl = `${YF_SEARCH_BASE}?q=${encodeURIComponent(q)}&lang=ja&region=JP&quotesCount=10&newsCount=0`;
    const proxied = ALLORIGINS_RAW + encodeURIComponent(apiUrl);
    const res = await fetch(proxied, { signal: _timeoutSignal(8000) });
    if (!res.ok) return;
    const json = await res.json();
    const quotes = (json.quotes || []).filter(q =>
      q.symbol && (q.symbol.endsWith('.T') || q.exchange === 'TKY' || q.exchange === 'OSA')
    );
    if (!quotes.length) return;
    // Merge with local results (remote fills gaps for non-N225)
    const dd = document.getElementById('searchDropdown');
    const existing = new Set([...dd.querySelectorAll('.search-item-code')].map(el => el.textContent));
    const newItems = quotes.slice(0, 8)
      .map(q => ({ code: q.symbol.replace('.T',''), name: q.shortname || q.longname || q.symbol.replace('.T','') }))
      .filter(({ code }) => !existing.has(code))
      .slice(0, 4);
    if (!newItems.length) return;
    newItems.forEach(({ code, name }) => {
      const div = document.createElement('div');
      div.className = 'search-item';
      div.onclick = () => selectItem(code);
      div.innerHTML = `<span class="search-item-name">${name}</span><span class="search-item-code">${code}</span>`;
      dd.appendChild(div);
    });
    dd.style.display = 'block';
  } catch { /* keep local results */ }
}

function selectItem(code) {
  pendingCode = code;
  const name = stockName(code);
  document.getElementById('searchInput').value = `${code} ${name}`;
  closeDropdown();
}

// ─────────────────────────────────────────────
// Persistence
// ─────────────────────────────────────────────
function saveTickers() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers));
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function round1(v) { return Math.round(v * 10) / 10; }
function clamp(v)  { return Math.max(0, Math.min(100, v)); }
function fmtP(p)   { if (p == null || isNaN(p)) return '-'; return Math.round(p).toLocaleString('ja-JP'); }
function sColor(s) { return s >= 70 ? 'high' : s >= 50 ? 'mid' : 'low'; }
function sBg(s)    { return s >= 70 ? 'var(--green)' : s >= 50 ? 'var(--yellow)' : 'var(--red)'; }

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
(function init() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const p = JSON.parse(saved);
      if (Array.isArray(p) && p.length === 10) tickers = p;
    }
  } catch {}
  renderSlotSelect();
  renderCards();
  // Close dropdown when clicking outside the search area
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) closeDropdown();
  });
})();
</script>
